<!DOCTYPE html>
<html lang="en">
<head><link rel="icon" type="image/x-icon" href="Images/Pebble logo.ico">    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pebble Live Scores</title>

<style>

body{
    margin:0;
    font-family:Poppins, sans-serif;
    background: radial-gradient(circle at top,#0b0f1a,#000);
    color:white;
    overflow-x:hidden;
}

/* BACK BUTTON */
.back{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 16px;
    background:linear-gradient(90deg,#ff005d,#00d4ff,#ff8c00);
    background-size:200%;
    border-radius:25px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    z-index:1000;
    transition:0.3s;
    animation:glowMove 4s infinite linear;
}

.back:hover{
    transform:scale(1.1);
}

@keyframes glowMove{
    0%{background-position:0%;}
    100%{background-position:200%;}
}

/* HEADER */
header{
    text-align:center;
    padding:70px 20px 10px;
}

header h1{
    font-size:3rem;
    letter-spacing:2px;
}

header span{
    background:linear-gradient(90deg,#00d4ff,#ff005d,#00ff88);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* LIVE BAR */
.livebar{
    text-align:center;
    color:#ff005d;
    font-size:0.85rem;
    animation:pulse 1s infinite;
    margin-bottom:10px;
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}

/* FACT */
.fact{
    text-align:center;
    color:#aaa;
    font-size:0.9rem;
    margin-bottom:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
    gap:20px;
    padding:20px 8% 60px;
}

/* CARD ULTRA EPIC */
.card{
    position:relative;
    background:rgba(11,15,26,0.9);
    border-radius:18px;
    padding:18px;
    border:1px solid rgba(0,212,255,0.15);
    overflow:hidden;
    transform:translateY(30px);
    opacity:0;
    transition:0.5s ease;
}

/* glow aura */
.card::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:radial-gradient(circle,rgba(0,212,255,0.15),transparent 60%);
    animation:rotate 6s linear infinite;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

/* hover epic zoom */
.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 0 30px rgba(0,212,255,0.25);
}

/* teams */
.teams{
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    z-index:2;
}

.team{
    width:40%;
    text-align:center;
}

/* score BIG EPIC */
.score{
    font-size:2rem;
    font-weight:bold;
    background:linear-gradient(90deg,#00d4ff,#ff005d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* LIVE DOT */
.live{
    margin-top:10px;
    text-align:center;
    font-size:0.75rem;
    color:#ff005d;
    animation:pulse 1s infinite;
}

/* LOADING */
.loading{
    text-align:center;
    color:#00d4ff;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.3;}
}

</style>
</head>

<body>

<a class="back" href="index.html">⬅ BACK</a>

<header>
    <h1>Pebble <span> LIVE</span></h1>
</header>

<div class="livebar">🔴 LIVE TRANSMISSION ACTIVE</div>

<div class="fact" id="fact"></div>

<div class="grid" id="grid"></div>

<script>

/* FACTS */
const facts = [
"⚽ Football is played in over 200 countries",
"🏆 The World Cup is watched by billions",
"⚽ A match lasts 90 minutes + extra time",
"🥅 Fastest goal recorded: under 2 seconds",
"⚽ Goalkeepers are the only ones who can use hands"
];

document.getElementById("fact").innerText =
facts[Math.floor(Math.random()*facts.length)];

/* API */
const API = "https://sportscore.com/api/widget/matches/?sport=football&limit=10";

async function loadScores(){

    const grid = document.getElementById("grid");
    grid.innerHTML = "<div class='loading'>Loading live stadium data...</div>";

    const res = await fetch(API);
    const data = await res.json();

    grid.innerHTML = "";

    if(!data.events){
        grid.innerHTML = "<p style='text-align:center'>No live matches right now ⚽</p>";
        return;
    }

    data.events.forEach((m,i)=>{

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="teams">
                <div class="team">${m.strHomeTeam}</div>
                <div class="score">${m.intHomeScore??0} - ${m.intAwayScore??0}</div>
                <div class="team">${m.strAwayTeam}</div>
            </div>
            <div class="live">🔴 LIVE ${m.strStatus || ""}</div>
        `;

        grid.appendChild(card);

        setTimeout(()=>{
            card.classList.add("show");
        }, i*120);

    });
}

loadScores();
setInterval(loadScores,15000);

</script>

</body>
</html>
